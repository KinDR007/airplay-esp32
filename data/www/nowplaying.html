<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Now Playing</title>
<style>
  :root { color-scheme: dark light; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #111;
    color: #eee;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 24px;
    box-sizing: border-box;
  }
  #art {
    width: min(80vw, 360px);
    height: min(80vw, 360px);
    background: #222 center/cover no-repeat;
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,.5);
    transition: background-image .3s;
  }
  #art.empty {
    display: flex;
    align-items: center;
    justify-content: center;
    color: #555;
    font-size: 14px;
  }
  #info {
    text-align: center;
    margin-top: 24px;
    max-width: 480px;
    word-wrap: break-word;
  }
  #title {
    font-size: 22px;
    font-weight: 600;
    margin: 0 0 6px;
  }
  #artist {
    font-size: 17px;
    opacity: .85;
    margin: 0 0 2px;
  }
  #album {
    font-size: 14px;
    opacity: .6;
    margin: 0;
  }
  #state {
    margin-top: 18px;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: .15em;
    opacity: .5;
  }
  #progress {
    width: min(80vw, 360px);
    margin-top: 12px;
    font-variant-numeric: tabular-nums;
    font-size: 12px;
    opacity: .6;
    display: flex;
    justify-content: space-between;
  }
  #bar {
    width: min(80vw, 360px);
    height: 3px;
    background: #333;
    border-radius: 2px;
    margin-top: 4px;
    overflow: hidden;
  }
  #bar > div {
    height: 100%;
    background: #4af;
    width: 0;
    transition: width .5s linear;
  }
</style>
</head>
<body>
  <div id="art" class="empty">no artwork</div>
  <div id="info">
    <p id="title">Idle</p>
    <p id="artist"></p>
    <p id="album"></p>
  </div>
  <div id="progress"><span id="pos">0:00</span><span id="dur">0:00</span></div>
  <div id="bar"><div id="fill"></div></div>
  <div id="state">stopped</div>

<script>
const fmt = s => {
  s = Math.max(0, s|0);
  const m = (s/60)|0, ss = (s%60).toString().padStart(2,'0');
  return m + ':' + ss;
};

// ---------- Position fix + extrapolation ----------
// iPhone sends ElapsedTime only sometimes (Apple Music: often; YouTube/etc:
// rarely). Take latest server value as a "fix" and extrapolate locally while
// state=='playing' for a smooth progress bar between server polls.
let posFix = { secs: 0, takenAt: 0, state: 'stopped' };

function currentPosition() {
  let p = posFix.secs;
  if (posFix.state === 'playing') {
    p += (Date.now() - posFix.takenAt) / 1000;
  }
  if (lastDuration > 0 && p > lastDuration) p = lastDuration;
  return p;
}

function paintProgress(durationSecs) {
  const p = currentPosition();
  document.getElementById('pos').textContent = fmt(p);
  document.getElementById('dur').textContent = fmt(durationSecs);
  const pct = durationSecs > 0 ? Math.min(100, (p / durationSecs) * 100) : 0;
  document.getElementById('fill').style.width = pct + '%';
}

let lastDuration = 0;
setInterval(() => paintProgress(lastDuration), 250);

// ---------- Main poll loop ----------
let lastRev = -1;
let lastServerPos = -1;
let currentTrackKey = null;
async function tick() {
  try {
    const r = await fetch('/api/nowplaying', {cache: 'no-store'});
    const d = await r.json();
    document.getElementById('state').textContent = d.state;
    document.getElementById('title').textContent  = d.title  || (d.haveText ? '—' : 'Idle');
    document.getElementById('artist').textContent = d.artist || '';
    document.getElementById('album').textContent  = d.album  || '';
    lastDuration = d.durationSecs;

    if (d.positionSecs !== lastServerPos) {
      posFix = { secs: d.positionSecs, takenAt: Date.now(), state: d.state };
      lastServerPos = d.positionSecs;
    } else {
      posFix.state = d.state;
    }
    paintProgress(lastDuration);

    const art = document.getElementById('art');
    if (d.haveArtwork && d.revision !== lastRev) {
      art.style.backgroundImage = `url('/api/nowplaying/artwork?r=${d.revision}')`;
      art.classList.remove('empty');
      art.textContent = '';
    } else if (!d.haveArtwork) {
      art.style.backgroundImage = '';
      art.classList.add('empty');
      art.textContent = 'no artwork';
    }
    lastRev = d.revision;

    // Reset extrapolation fix on track change.
    if (d.haveText && d.artist && d.title) {
      const key = d.artist + '|' + d.title;
      if (key !== currentTrackKey) {
        currentTrackKey = key;
        posFix = { secs: 0, takenAt: Date.now(), state: d.state };
        lastServerPos = 0;
      }
    } else if (!d.haveText) {
      currentTrackKey = null;
    }
  } catch (e) {
    document.getElementById('state').textContent = 'offline';
  }
}
setInterval(tick, 2000);
tick();
</script>
</body>
</html>
