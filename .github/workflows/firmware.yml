name: Firmware

# Builds every PlatformIO environment (firmware + SPIFFS filesystem) and
# publishes the flashable binaries:
#   - as downloadable workflow artifacts on every push / PR / manual run
#   - attached to the GitHub Release automatically when a release is published
#
# Each env produces a merged <env>-factory.bin (flash at 0x0, app + filesystem)
# plus the individual partitions and a FLASH.md with esptool commands.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write # needed to attach assets to the release on tag builds

concurrency:
  group: firmware-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env:
          - squeezeamp
          - squeezeamp-bt
          - squeezeamp-4m
          - esp32s3
          - esp32s3-jtag
          - xiao-s3
          - esp32wrover-dev
          - esparagus-audio-brick
          - esparagus-audio-brick-bt
          - esparagus-audio-brick-s3
          - esparagus-louder
          - esparagus-louder-bt
          - esparagus-louder-s3
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive # u8g2 is a submodule

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache PlatformIO + pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ matrix.env }}-${{ hashFiles('platformio.ini', 'dependencies.lock') }}
          restore-keys: |
            pio-${{ runner.os }}-${{ matrix.env }}-
            pio-${{ runner.os }}-

      - name: Install PlatformIO + esptool + protoc
        run: |
          python -m pip install --upgrade pip
          pip install platformio "esptool~=4.8"
          # protoc must exist at CMake configure time for cspot's nanopb setup.
          sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Build firmware
        # cspot (Spotify) generates protobuf/*.pb.h with nanopb at build time.
        # The generator runs via `#!/usr/bin/env python3`, so that python needs
        # `protobuf` + `pkg_resources` (pkg_resources still ships in <81). And on
        # a clean parallel build Ninja compiles spotify_connect.cpp before the
        # generator runs, so we generate the headers explicitly up front.
        run: |
          # 1) Bootstrap the espidf venv + configure (creates build.ninja).
          #    May fail at proto-gen for Spotify envs — handled below.
          pio run -e ${{ matrix.env }} || true
          # 2) Make protobuf + pkg_resources importable for the generator
          #    (runner python that `env python3` resolves to, and the venv).
          pip install -U "protobuf" "setuptools<81"
          for py in "$HOME"/.platformio/penv/.espidf-*/bin/python; do
            [ -x "$py" ] && "$py" -m pip install -U "protobuf" "setuptools<81" || true
          done
          # 3) Generate cspot's protobuf headers explicitly (no-op for
          #    Spotify-disabled envs, where the target doesn't exist).
          ninja=$(ls "$HOME"/.platformio/packages/tool-ninja/ninja 2>/dev/null || command -v ninja)
          "$ninja" -C ".pio/build/${{ matrix.env }}" \
            esp-idf/cspot/cspot_lib/generate_proto_sources || true
          # 4) Real build — headers now exist.
          pio run -e ${{ matrix.env }}

      - name: Build filesystem (SPIFFS)
        run: pio run -e ${{ matrix.env }} -t buildfs

      - name: Package binaries
        run: python tools/ci/package_firmware.py ${{ matrix.env }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.env }}
          path: dist/${{ matrix.env }}/**
          if-no-files-found: error

      - name: Zip for release
        if: github.event_name == 'release'
        run: |
          cd dist
          zip -r "../firmware-${{ matrix.env }}.zip" "${{ matrix.env }}"

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: firmware-${{ matrix.env }}.zip
          fail_on_unmatched_files: true
